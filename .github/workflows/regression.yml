name: Regression Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  regression:
    name: Hurl Regression Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: piivault
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Hurl
        run: |
          HURL_VERSION=$(curl -sf https://api.github.com/repos/Orange-OpenSource/hurl/releases/latest | grep '"tag_name"' | cut -d '"' -f 4)
          curl -LO "https://github.com/Orange-OpenSource/hurl/releases/download/${HURL_VERSION}/hurl_${HURL_VERSION#v}_amd64.deb"
          sudo dpkg -i "hurl_${HURL_VERSION#v}_amd64.deb"
          hurl --version

      - name: Create .env
        run: |
          cp .env.example .env
          # Override DB host to use GitHub Actions service container
          sed -i 's/DB_HOST=.*/DB_HOST=localhost/' .env

      - name: Run database migrations
        run: |
          # Wait for postgres to be ready then run the server briefly to apply migrations
          go run cmd/server/main.go &
          SERVER_PID=$!
          sleep 5
          kill $SERVER_PID 2>/dev/null || true

      - name: Start AEGIS server
        run: |
          go run cmd/server/main.go &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # Wait until health endpoint responds
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/health >/dev/null; then
              echo "Server is up."
              break
            fi
            echo "Waiting for server... ($i)"
            sleep 2
          done

      - name: Run regression tests
        run: ./tests/run_tests.sh --no-clean
        env:
          BASE_URL: http://localhost:8080

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true
